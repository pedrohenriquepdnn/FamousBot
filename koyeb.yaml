# koyeb.yaml
name: famous-bot
region: gru  # São Paulo - melhor latência para Brasil

services:
  - name: bot-service
    docker:
      image: node:18-slim
    ports:
      - port: 3000
        protocol: http
    env:
      - key: NODE_VERSION
        value: "18"
      - key: TZ
        value: "America/Sao_Paulo"
    instance:
      - type: micro
        min: 1
        max: 1
    health_check:
      path: /api/test
      interval: 30s
      timeout: 10s
    routes:
      - path: /
    build_command: npm install && npx playwright install chromium
    run_command: npm start